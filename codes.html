<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial, Helvetica, sans-serif}
body{background:black;color:white;min-height:100vh;display:flex;flex-direction:column}
.main{flex:1;display:flex;justify-content:center;align-items:center;text-align:center;padding:20px}

.codes-wrap{background:#0b0b0b;padding:22px;border-radius:12px;border:1px solid #222}

.codes-table th{background:linear-gradient(90deg,#ff4d00,#ff0066);-webkit-background-clip:text;background-clip:text;color:transparent}
.codes-table td{background:rgba(255,255,255,0.02)}
.codes-table td[contenteditable]{cursor:text}

.actions{margin-top:18px;display:flex;gap:12px;justify-content:center}
.btn{display:inline-block;padding:12px 28px;border-radius:8px;text-decoration:none;color:white;font-weight:600;background:linear-gradient(90deg,#ff4d00,#ff0066);transition:0.3s}
.btn:hover{opacity:0.9}

/* responsive */
@media (max-width:600px){h1{font-size:22px}.container{padding:0 8px}}

</style>
</head>
